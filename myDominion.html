<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myDominion - Account Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Condensed', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .background-layers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-size: 200px 200px;
            animation: drift 20s linear infinite;
        }

        .bg-layer-2 {
            animation: drift-reverse 30s linear infinite;
        }

        @keyframes drift {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(200px) translateY(200px); }
        }

        @keyframes drift-reverse {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-200px) translateY(-200px); }
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* Screen flicker */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: none;
            animation: flicker 0.15s infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Card */
        .card {
            background: rgba(10, 10, 10, 0.95);
            border: 3px solid #8b7355;
            border-top: 3px solid #ffd700;
            border-bottom: 3px solid #ffd700;
            box-shadow: 
                inset 0 1px 0 rgba(255, 215, 0, 0.2),
                0 0 30px rgba(255, 215, 0, 0.3),
                0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            animation: slide-in 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            animation: shine 3s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Title */
        .title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.5),
                0 0 20px rgba(255, 215, 0, 0.3);
            color: #ffd700;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.6); }
        }

        .subtitle {
            text-align: center;
            color: #d4a574;
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Separator */
        .separator {
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 0 auto 30px;
        }

        /* Form group */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ffb84d;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #8b7355;
            color: #ffd700;
            font-family: 'Roboto Condensed', Arial, sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .form-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 10px rgba(255, 215, 0, 0.3);
            background: rgba(20, 20, 20, 0.95);
        }

        .form-input::placeholder {
            color: #8b7355;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: #ffd700;
            cursor: pointer;
        }

        .checkbox-label {
            color: #ffb84d;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid #ffd700;
            background: rgba(30, 30, 30, 0.8);
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Roboto Condensed', Arial, sans-serif;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            box-shadow: 
                0 0 0 1px rgba(255, 215, 0, 0.2) inset,
                0 4px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-2px) scaleX(1.02);
            box-shadow: 
                0 0 0 1px rgba(255, 215, 0, 0.5) inset,
                0 0 15px rgba(255, 215, 0, 0.4),
                0 8px 16px rgba(0, 0, 0, 0.4);
            background: rgba(50, 40, 20, 0.9);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0) scaleX(0.98);
        }

        .btn-primary {
            border-color: #ffd700;
            color: #ffd700;
        }

        .btn-secondary {
            border-color: #ffb84d;
            color: #ffb84d;
            background: rgba(20, 20, 20, 0.6);
        }

        .btn-secondary:hover {
            background: rgba(40, 30, 10, 0.8);
            box-shadow: 
                0 0 15px rgba(255, 184, 77, 0.3),
                0 8px 16px rgba(0, 0, 0, 0.4);
        }

        /* Tab buttons */
        .tab-buttons {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #8b7355;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #8b7355;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-family: 'Roboto Condensed', Arial, sans-serif;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .tab-btn.active {
            color: #ffd700;
            border-bottom-color: #ffd700;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.2);
        }

        .tab-btn:hover {
            color: #ffb84d;
        }

        /* Error message */
        .error-message {
            background: rgba(139, 0, 0, 0.2);
            border-left: 4px solid #ff4444;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff6666;
            font-size: 0.9rem;
            display: none;
            animation: slide-down 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        /* Success message */
        .success-message {
            background: rgba(0, 139, 0, 0.2);
            border-left: 4px solid #44ff44;
            padding: 12px;
            margin-bottom: 20px;
            color: #66ff66;
            font-size: 0.9rem;
            display: none;
            animation: slide-down 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toggle button */
        .toggle-form {
            text-align: center;
            margin-top: 25px;
            color: #8b7355;
            font-size: 0.9rem;
        }

        .toggle-form a {
            color: #ffd700;
            cursor: pointer;
            text-decoration: underline;
            transition: all 0.3s ease;
        }

        .toggle-form a:hover {
            color: #ffb84d;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* Account info (logged in state) */
        .account-info {
            text-align: center;
            display: none;
        }

        .account-info.show {
            display: block;
        }

        .account-username {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .account-email {
            color: #ffb84d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .account-created {
            color: #8b7355;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* Back to game button */
        .back-to-game {
            text-align: center;
            margin-top: 25px;
        }

        .back-to-game a {
            color: #ffd700;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-to-game a:hover {
            color: #ffb84d;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
            }

            .title {
                font-size: 2rem;
            }

            .form-input {
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .btn {
                font-size: 0.9rem;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-top: 2px solid #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="background-layers">
        <div class="bg-layer" style="background-image: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"200\"><rect fill=\"%23ffd700\" width=\"1\" height=\"1\"/></svg>')"></div>
        <div class="bg-layer bg-layer-2" style="background-image: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"200\"><rect fill=\"%238b7355\" width=\"1\" height=\"1\"/></svg>')"></div>
    </div>

    <div class="container">
        <div class="card">
            <h1 class="title">myDOMINION</h1>
            <p class="subtitle">Account Management System</p>
            <div class="separator"></div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message"></div>

            <!-- Account Info (Logged In) -->
            <div id="accountInfo" class="account-info">
                <div class="account-username" id="displayUsername"></div>
                <div class="account-email" id="displayEmail"></div>
                <div class="account-created" id="displayCreated"></div>
                <button class="btn btn-primary" onclick="logoutUser()">🔓 LOGOUT</button>
                <div class="back-to-game">
                    <a href="index.html">← Return to Iron Dominion</a>
                </div>
            </div>

            <!-- Login/Register Forms -->
            <div id="authForms">
                <!-- Tab Buttons -->
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
                    <button class="tab-btn" onclick="switchTab('register')">REGISTER</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="rememberMe" class="checkbox-input" checked>
                            <label for="rememberMe" class="checkbox-label">Remember me for 30 days</label>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">🔐 LOGIN</button>
                            <button type="button" class="btn btn-secondary" onclick="switchTab('register')">Create Account →</button>
                        </div>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display: none;">
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="registerUsername" class="form-input" placeholder="3-30 characters (a-z, 0-9, -, _)" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="registerPassword" class="form-input" placeholder="6+ characters" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="registerConfirm" class="form-input" placeholder="Confirm password" required>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn btn-primary">⚔ REGISTER</button>
                            <button type="button" class="btn btn-secondary" onclick="switchTab('login')">← Back to Login</button>
                        </div>
                    </form>
                </div>

                <div class="back-to-game">
                    <a href="index.html">← Return to Iron Dominion</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/php';

        // Check if user is already logged in on page load
        document.addEventListener('DOMContentLoaded', checkAuthStatus);

        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/check-auth.php`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.authenticated) {
                    showAccountInfo(data);
                } else {
                    showAuthForms();
                }
            } catch (error) {
                console.error('Auth check error:', error);
                showAuthForms();
            }
        }

        function showAccountInfo(user) {
            document.getElementById('authForms').style.display = 'none';
            document.getElementById('accountInfo').classList.add('show');
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayEmail').textContent = user.email;
            document.getElementById('displayCreated').textContent = 'Logged in successfully • Welcome Commander!';
        }

        function showAuthForms() {
            document.getElementById('authForms').style.display = 'block';
            document.getElementById('accountInfo').classList.remove('show');
        }

        function switchTab(tab) {
            // Hide/show forms
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Clear messages
            clearMessages();
        }

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                const response = await fetch(`${API_BASE_URL}/login.php`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        remember_me: rememberMe
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        checkAuthStatus();
                    }, 1000);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Connection error. Please try again.');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/register.php`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Account created! Switching to login...');
                    setTimeout(() => {
                        document.getElementById('loginUsername').value = username;
                        switchTab('login');
                        clearMessages();
                    }, 1500);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                console.error('Register error:', error);
                showError('Connection error. Please try again.');
            }
        }

        async function logoutUser() {
            try {
                await fetch(`${API_BASE_URL}/logout.php`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                showSuccess('Logged out. Redirecting...');
                setTimeout(() => {
                    checkAuthStatus();
                }, 1000);
            } catch (error) {
                console.error('Logout error:', error);
                showError('Logout failed');
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
